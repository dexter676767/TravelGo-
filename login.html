<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelGo! - Masuk</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <img src="assets/img/logo.png" alt="Logo TravelGo" class="logo">
    <ul>
      <li><a href="index.html">Beranda</a></li>
      <li><a href="login.html">Masuk</a></li>
      <li><a href="signup.html">Daftar</a></li>
      <li><a href="#">Bantuan</a></li>
    </ul>
  </nav>

  <!-- Form Login -->
  <div class="form-container">
    <h1>TravelGo!</h1>
    <p class="tagline">Selamat datang, traveler</p>

    <h2>Masuk</h2>
    <form id="loginForm">
      <input type="text" class="username" placeholder="Nama pengguna">
      <input type="password" class="password" placeholder="Kata sandi">
      <span class="link"><a href="#">Lupa kata sandi?</a></span>
      <button type="submit" class="btn">Masuk</button>
    </form>

    <div class="social-icons">
      <img src="assets/icons/facebook.svg" alt="Facebook">
      <img src="assets/icons/google.svg" alt="Google">
      <img src="assets/icons/apple.svg" alt="Apple">
    </div>

    <span class="link">Belum punya akun? <a href="signup.html">Daftar</a></span>
  </div>
</body>
</html>
