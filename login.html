<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelGo! - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
</head>
<body>
  <div class="form-container">
    <h1>TravelGo!</h1>
    <p class="tagline">welcome traveler</p>

    <h2>LOGIN</h2>
    <form id="loginForm">
      <input type="text" class="username" placeholder="Username">
      <input type="password" class="password" placeholder="Password">
      <span class="link"><a href="#">Forgot password?</a></span>
      <button class="btn">Log in</button>
    </form>

    <div class="social-icons">
      <img src="assets/icons/facebook.svg" alt="Facebook">
      <img src="assets/icons/google.svg" alt="Google">
      <img src="assets/icons/apple.svg" alt="Apple">
    </div>

    <span class="link">Not Registered yet? <a href="signup.html">Sign up</a></span>
  </div>
</body>
</html>
