<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelGo! - Masuk</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Defer memastikan JS jalan setelah HTML dimuat -->
  <script src="js/script.js" defer></script>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <img src="assets/img/logo.png" alt="Logo TravelGo" class="logo">
    <ul>
      <li><a href="index.html">Beranda</a></li>
      <li><a href="login.html">Masuk</a></li>
      <li><a href="signup.html">Daftar</a></li>
      <li><a href="#">Bantuan</a></li>
    </ul>
  </nav>

  <!-- Form Login -->
  <div class="form-container">
    <h1>TravelGo!</h1>
    <p class="tagline">Selamat datang, traveler</p>

    <h2>Masuk</h2>
    <form id="loginForm">
      <!-- Menambahkan label (bisa disembunyikan dengan CSS jika ingin tampilan minimalis) -->
      <div class="input-group">
        <input type="text" id="username" name="username" class="username" placeholder="Nama pengguna" required>
      </div>
      
      <div class="input-group">
        <input type="password" id="password" name="password" class="password" placeholder="Kata sandi" required>
      </div>

      <div class="form-options">
        <span class="link"><a href="#">Lupa kata sandi?</a></span>
      </div>

      <button type="submit" class="btn">Masuk</button>
    </form>

    <div class="social-icons">
      <!-- Menggunakan anchor tag agar icon bisa diklik -->
      <a href="#"><img src="assets/icons/facebook.svg" alt="Masuk dengan Facebook"></a>
      <a href="#"><img src="assets/icons/google.svg" alt="Masuk dengan Google"></a>
      <a href="#"><img src="assets/icons/apple.svg" alt="Masuk dengan Apple"></a>
    </div>

    <span class="link">Belum punya akun? <a href="signup.html">Daftar</a></span>
  </div>
</body>
</html>
