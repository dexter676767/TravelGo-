<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Plataran Dharmawangsa</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <section class="photo-section">
    <h2>THE AMBIENCE</h2>
    <div class="slider">
      <button class="arrow left" onclick="moveSlide(-1)">&#10094;</button>
      <div class="slides">
        <div class="slide"><img src="assets/img/plataran1.jpg" alt="Plataran 1"></div>
        <div class="slide"><img src="assets/img/plataran2.jpg" alt="Plataran 2"></div>
        <div class="slide"><img src="assets/img/plataran3.jpg" alt="Plataran 3"></div>
      </div>
      <button class="arrow right" onclick="moveSlide(1)">&#10095;</button>
    </div>
  </section>

  <script>
    let currentIndex = 0;
    function moveSlide(direction) {
      const slides = document.querySelector('.slides');
      const totalSlides = document.querySelectorAll('.slide').length;
      currentIndex += direction;
      if (currentIndex < 0) currentIndex = totalSlides - 1;
      else if (currentIndex >= totalSlides) currentIndex = 0;
      slides.style.transform = `translateX(-${currentIndex * 100}%)`;
    }
  </script>
</body>
</html>
