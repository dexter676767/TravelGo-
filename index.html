<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TravelGo! | Kuliner Jakarta Selatan - Info Lengkap & Reservasi Kursi</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #fef8f0; color: #1e2a2f; scroll-behavior: smooth; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

    /* Navbar */
    .navbar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 2px solid #ffd966; }
    .logo h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #e67e22, #f39c12); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo span { font-size: 0.9rem; font-weight: 500; color: #b86f2c; display: block; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links li a { text-decoration: none; font-weight: 600; color: #2c3e2f; transition: 0.2s; }
    .nav-links li a:hover, .nav-links li a.active { color: #e67e22; border-bottom: 2px solid #e67e22; padding-bottom: 4px; }

    /* Search & filter */
    .search-section { margin: 40px 0 30px; }
    .search-bar { display: flex; flex-wrap: wrap; gap: 15px; background: white; padding: 12px 20px; border-radius: 60px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .search-input { flex: 3; display: flex; align-items: center; gap: 10px; background: #f4f2ef; padding: 8px 18px; border-radius: 40px; }
    .search-input input { border: none; background: transparent; width: 100%; font-size: 1rem; outline: none; font-family: 'Poppins', sans-serif; }
    .filter-category { flex: 2; display: flex; gap: 10px; align-items: center; }
    .filter-category select, .filter-category button { padding: 10px 18px; border-radius: 40px; border: none; background: #f4f2ef; font-weight: 500; cursor: pointer; }
    .filter-category button { background: #e67e22; color: white; transition: 0.2s; }
    .filter-category button:hover { background: #cf711f; }

    /* Resto Grid */
    .section-title { font-size: 1.8rem; font-weight: 700; margin: 20px 0 25px 0; border-left: 8px solid #e67e22; padding-left: 20px; }
    .resto-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 28px; margin-bottom: 60px; }
    .resto-card { background: white; border-radius: 28px; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.08); transition: 0.25s; }
    .resto-card:hover { transform: translateY(-6px); }
    .card-img { height: 170px; background: #ffddb0; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #c25d1a; }
    .card-content { padding: 20px; }
    .resto-name { font-size: 1.5rem; font-weight: 700; display: flex; justify-content: space-between; }
    .resto-loc { color: #6c584c; font-size: 0.8rem; margin: 5px 0; }
    .hours-badge { background: #e9f5e9; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin: 8px 0; }
    .price { font-weight: 700; color: #2c6e2f; }
    .rating-stars { color: #f4b400; margin: 8px 0; font-weight: 600; }
    .amenities { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
    .amenities span { background: #fef2e6; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; }
    .action-buttons { display: flex; gap: 12px; margin: 15px 0 10px; }
    .btn-reserve, .btn-check-seats { background: #e67e22; border: none; padding: 8px 16px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-check-seats { background: #2c6e2f; }
    .btn-reserve:hover, .btn-check-seats:hover { opacity: 0.85; }
    .resto-info { font-size: 0.7rem; color: #5c6e5a; margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; }
    .resto-info i { margin-right: 4px; width: 18px; }

    /* Modal Bioskop-Style Seat Selection */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; overflow-y: auto; }
    .modal-content { background: white; max-width: 700px; width: 95%; padding: 28px; border-radius: 32px; max-height: 90vh; overflow-y: auto; }
    .modal-content h3 { margin-bottom: 20px; }
    .seat-screen { background: #222; color: white; text-align: center; padding: 8px; border-radius: 12px; margin: 15px 0; font-size: 0.8rem; letter-spacing: 2px; }
    .seats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin: 20px 0; justify-items: center; }
    .seat { background: #e0e0e0; width: 55px; height: 55px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 16px; cursor: pointer; font-size: 0.7rem; font-weight: bold; transition: 0.1s; border: 2px solid transparent; }
    .seat.available { background: #b0d9b1; color: #1e4a1e; }
    .seat.booked { background: #f4a4a4; color: #8b0000; cursor: not-allowed; text-decoration: line-through; }
    .seat.selected { background: #f39c12; border: 3px solid #e67e22; color: white; transform: scale(1.02); }
    .seat small { font-size: 0.6rem; }
    .seat-info { margin: 15px 0; padding: 12px; background: #f9f2e6; border-radius: 24px; }
    .modal-buttons { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
    footer { background: #1e2a2f; color: #ccc; padding: 30px 0; margin-top: 40px; text-align: center; }
    @media (max-width: 680px) { .navbar { flex-direction: column; gap: 15px; } .seats-grid { grid-template-columns: repeat(4, 1fr); } .seat { width: 60px; height: 60px; } }
  </style>
</head>
<body>

<div class="container">
  <div class="navbar">
    <div class="logo"><h1>TravelGo! <span>culinary highlight Jakarta Selatan</span></h1></div>
    <ul class="nav-links"><li><a href="#" class="active">Home</a></li><li><a href="#">Restoran</a></li><li><a href="#">Kontak</a></li></ul>
  </div>

  <div class="search-section">
    <div class="search-bar">
      <div class="search-input"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Cari restoran, menu, atau lokasi..."></div>
      <div class="filter-category"><select id="categoryFilter"><option value="all">Semua Kategori</option><option value="indonesian">Nusantara</option><option value="middle-eastern">Timur Tengah</option><option value="international">Internasional</option></select><button id="searchBtn"><i class="fas fa-sliders-h"></i> Filter</button></div>
    </div>
  </div>

  <div class="section-title"><i class="fas fa-utensils"></i> Rekomendasi Kuliner Jakarta Selatan</div>
  <div class="resto-grid" id="restoGrid"></div>
  <footer><p>© 2025 TravelGo! — Informasi Menu, Harga, Fasilitas, Lokasi & Reservasi Kursi Bergaya Bioskop</p></footer>
</div>

<!-- MODAL RESERVASI dengan layout kursi (cinema style) -->
<div id="reservationModal" class="modal">
  <div class="modal-content" id="modalContentDynamic">
    <!-- konten dinamis via js -->
  </div>
</div>

<script>
  // ----------------------------- DATA LENGKAP 5 RESTORAN ---------------------------------
  const restaurants = [
    {
      id: 1, name: "Lumpang Emas Signature - Prapanca", category: "indonesian",
      location: "Jl. Prapanca Raya No.40A, Pulo, Kec. Kby. Baru, Jakarta Selatan",
      operationHours: "10.00–22.00 (Setiap hari), Breakfast Sabtu-Minggu 07.00-11.00",
      priceRange: "Rp87k - Rp393k",
      rating: 4.8, totalReviews: 1127,
      facilities: "Wheelchair access, Toilet, Wi-Fi, Bar on site, Outdoor seating, No-contact delivery, Takeaway, Dine-in",
      menuHighlights: "Paru Asam Manis, Kulit Ayam Goreng, Steak Nusantara",
      phone: "(021)80600900", website: "https://lumpangemas.com/",
      imgIcon: "🍖", totalSeats: 42, // total meja/kursi (acak base)
      seatMap: [], // akan di generate random
      description: "Great coffee, dessert, casual & cozy atmosphere. Breakfast, Lunch, Dinner. Accepts reservations."
    },
    {
      id: 2, name: "Cerita Rasa Nusantara", category: "indonesian",
      location: "Jl. Ampera Raya No.9, Cilandak Timur, Jakarta Selatan",
      operationHours: "10.00–22.00 setiap hari",
      priceRange: "Rp39k - Rp169k",
      rating: 4.6, totalReviews: 4795,
      facilities: "Wheelchair access, Live music, Free parking, Wi-Fi, Private dining, Kids' menu, Outdoor seating",
      menuHighlights: "Gurame Bakar, Ayam Taliwang, Nasi Goreng Cerita Rasa",
      phone: "02178831600", website: "http://www.ceritarasa.co.id/",
      imgIcon: "🍛", totalSeats: 56,
      description: "Classic Indonesian, live music, romantis & family friendly."
    },
    {
      id: 3, name: "Jakarta Restaurant & The Courtyard", category: "international",
      location: "Jl. Brawijaya Raya No.26, Pulo, Kebayoran Baru",
      operationHours: "07.00–22.00 setiap hari",
      priceRange: "Rp115k - Rp595k",
      rating: 4.7, totalReviews: 639,
      facilities: "Halal food, Private dining, Art Deco, Leafy courtyard, Valet parking, Kids' menu",
      menuHighlights: "Sop Buntut, Nasi Goreng Dharmawangsa, Australian Beef Tenderloin",
      phone: "08111025999", website: "http://www.the-dharmawangsa.com/",
      imgIcon: "🍽️", totalSeats: 78,
      description: "Hotel restaurant dengan nuansa Art Deco & courtyard. Breakfast sampai dinner."
    },
    {
      id: 4, name: "Plataran Dharmawangsa", category: "indonesian",
      location: "Jl. Dharmawangsa Raya No.6, Pulo, Kebayoran Baru",
      operationHours: "11.00–22.00 setiap hari",
      priceRange: "Rp55k - Rp225k",
      rating: 4.7, totalReviews: 4112,
      facilities: "Live music, Joglo house, Valet parking, Organic dishes, Vegetarian options, Cocktails",
      menuHighlights: "Dendeng Batokok, Empal Gentong, Udang Gandum",
      phone: "(021)29044167", website: "https://plataran.com/property/plataran-dharmawangsa/",
      imgIcon: "🍲", totalSeats: 64,
      description: "Suasana rumah tradisional Jawa, otentik, cocok untuk romantis & grup."
    },
    {
      id: 5, name: "Abunawas Restaurant - Kemang Branch", category: "middle-eastern",
      location: "Jl. Kemang Utara No.15, Bangka, Mampang Prapatan",
      operationHours: "09.00–21.45 setiap hari",
      priceRange: "Rp42k - Rp855k",
      rating: 4.6, totalReviews: 3173,
      facilities: "Middle Eastern decor, Plush seating, Free Wi-Fi, Valet parking, Kids' menu, Private dining",
      menuHighlights: "Mandhi Lamb, Briyani, Mix Grill, Hummus Platter",
      phone: "(021)71794691", website: "http://abunawasresto.com/",
      imgIcon: "🥘", totalSeats: 50,
      description: "Masakan Timur Tengah otentik, suasana mewah, cocok untuk keluarga."
    }
  ];

  // Generate random seat availability untuk setiap restoran (acak total kursi yang tersedia vs booked)
  function generateSeatMap(resto) {
    const total = resto.totalSeats;
    const bookedCount = Math.floor(Math.random() * (total * 0.4)) + Math.floor(total * 0.1); // 10%-50% terisi random
    let seats = [];
    for (let i = 1; i <= total; i++) {
      let isBooked = false;
      if (i <= bookedCount) {
        // lebih random
        isBooked = Math.random() < 0.6;
      } else {
        isBooked = false;
      }
      seats.push({ seatNumber: i, isBooked: isBooked, isSelected: false });
    }
    // pastikan tidak semua penuh
    return seats;
  }

  // inisialisasi seat maps untuk setiap restoran jika belum ada
  function initSeatMaps() {
    restaurants.forEach(r => {
      if (!r.seatMap || r.seatMap.length === 0) {
        r.seatMap = generateSeatMap(r);
      }
    });
  }
  initSeatMaps();

  // Helper: hitung available seats
  function getAvailableSeatsCount(resto) {
    return resto.seatMap.filter(seat => !seat.isBooked).length;
  }

  // Render semua restoran ke grid
  function renderRestaurants(filteredData) {
    const container = document.getElementById('restoGrid');
    if (!container) return;
    container.innerHTML = '';
    filteredData.forEach(resto => {
      const available = getAvailableSeatsCount(resto);
      const card = document.createElement('div');
      card.className = 'resto-card';
      card.innerHTML = `
        <div class="card-img">${resto.imgIcon} <span style="font-size:0.8rem; margin-left:5px">⭐ ${resto.rating}</span></div>
        <div class="card-content">
          <div class="resto-name">${resto.name}</div>
          <div class="resto-loc"><i class="fas fa-map-marker-alt"></i> ${resto.location}</div>
          <div class="hours-badge"><i class="far fa-clock"></i> ${resto.operationHours.substring(0, 40)}${resto.operationHours.length>40?'..':''}</div>
          <div class="price"><i class="fas fa-tag"></i> ${resto.priceRange}</div>
          <div class="rating-stars">⭐ ${resto.rating} (${resto.totalReviews} ulasan)</div>
          <div class="amenities">${resto.facilities.split(',').slice(0,3).map(f => `<span>${f.trim()}</span>`).join('')}<span>+${resto.facilities.split(',').length-3} fasilitas</span></div>
          <div class="action-buttons">
            <button class="btn-check-seats" data-id="${resto.id}"><i class="fas fa-chair"></i> Cek Kursi (Tersisa: ${available})</button>
            <button class="btn-reserve" data-id="${resto.id}"><i class="fas fa-calendar-check"></i> Reservasi Kursi</button>
          </div>
          <div class="resto-info"><i class="fas fa-phone"></i> ${resto.phone} | <i class="fas fa-globe"></i> ${resto.website}<br><i class="fas fa-utensils"></i> Menu unggulan: ${resto.menuHighlights}</div>
        </div>
      `;
      container.appendChild(card);
    });
    // attach events
    document.querySelectorAll('.btn-check-seats').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        openSeatChecker(id);
      });
    });
    document.querySelectorAll('.btn-reserve').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        openReservationModal(id);
      });
    });
  }

  // Menampilkan Cek Kursi (UI bioskop) tanpa proses booking langsung, hanya lihat
  function openSeatChecker(restoId) {
    const resto = restaurants.find(r => r.id === restoId);
    if (!resto) return;
    const availableCount = getAvailableSeatsCount(resto);
    renderSeatModal(resto, `mode=view`, null);
  }

  // Modal Reservasi dengan pemilihan kursi (sama layout tapi bisa pilih dan simpan)
  let currentRestoForReservation = null;
  let tempSelectedSeats = [];

  function openReservationModal(restoId) {
    const resto = restaurants.find(r => r.id === restoId);
    if (!resto) return;
    currentRestoForReservation = resto;
    // reset temporary selection
    tempSelectedSeats = [];
    renderSeatModal(resto, `mode=reserve`, (selectedSeatNumbers) => {
      // callback final booking
      if(selectedSeatNumbers.length === 0) {
        alert("Pilih minimal 1 kursi/meja untuk reservasi.");
        return false;
      }
      // konfirmasi booking
      const guestName = prompt("Masukkan nama Anda untuk reservasi:", "Pelanggan TravelGo");
      if(!guestName) return false;
      // update seatMap status menjadi booked
      selectedSeatNumbers.forEach(seatNum => {
        const seatObj = resto.seatMap.find(s => s.seatNumber === seatNum);
        if(seatObj && !seatObj.isBooked) seatObj.isBooked = true;
      });
      alert(`✅ Reservasi berhasil! Restoran: ${resto.name}\nNama: ${guestName}\nKursi terpilih: ${selectedSeatNumbers.join(', ')}\nTotal kursi tersisa sekarang: ${getAvailableSeatsCount(resto)}\nTerima kasih! Tim restoran akan menghubungi.`);
      // refresh tampilan grid
      const filtered = getFilteredRestaurants();
      renderRestaurants(filtered);
      document.getElementById('reservationModal').style.display = 'none';
      return true;
    });
  }

  // Fungsi utama render modal layout kursi seperti bioskop
  function renderSeatModal(resto, mode, onConfirmCallback) {
    const modal = document.getElementById('reservationModal');
    const modalContentDiv = document.getElementById('modalContentDynamic');
    const availableSeats = resto.seatMap.filter(s => !s.isBooked).length;
    const total = resto.totalSeats;
    
    // layout grid mengikuti jumlah kursi, dibuat per baris 6 kursi
    let seatsHtml = `<div class="seat-screen"><i class="fas fa-film"></i> LAYAR RESTO - Pilih kursi/meja</div>`;
    seatsHtml += `<div class="seats-grid" id="dynamicSeatsGrid">`;
    resto.seatMap.forEach((seat, idx) => {
      let seatClass = 'seat';
      let statusText = '';
      if (seat.isBooked) {
        seatClass += ' booked';
        statusText = 'Dipesan';
      } else {
        seatClass += ' available';
        statusText = 'Tersedia';
      }
      // jika mode reserve dan sedang dalam selectedSementara (tempSelectedSeats)
      let isTempSelected = (mode === 'reserve' && tempSelectedSeats.includes(seat.seatNumber));
      let extraSelected = isTempSelected ? ' selected' : '';
      seatsHtml += `<div class="${seatClass}${extraSelected}" data-seat="${seat.seatNumber}" data-booked="${seat.isBooked}">
                      <i class="fas fa-chair"></i> <strong>${seat.seatNumber}</strong><br><small>${statusText}</small>
                    </div>`;
    });
    seatsHtml += `</div><div class="seat-info"><i class="fas fa-info-circle"></i> Total kursi: ${total} | Kursi tersedia: ${availableSeats} | <span id="selectedCounter">0</span> kursi dipilih (klik kursi tersedia)</div>`;
    
    let actionButtons = '';
    if (mode === 'reserve') {
      actionButtons = `<div class="modal-buttons"><button id="cancelReserveBtn" class="close-modal">Batal</button><button id="confirmBookingBtn" class="submit-modal"><i class="fas fa-check-circle"></i> Konfirmasi Reservasi</button></div>`;
    } else {
      actionButtons = `<div class="modal-buttons"><button id="closeSeatViewBtn" class="close-modal">Tutup</button></div>`;
    }
    
    modalContentDiv.innerHTML = `
      <h3><i class="fas fa-utensils"></i> ${resto.name} - Pilih Kursi / Meja</h3>
      <p><strong>Jam operasional:</strong> ${resto.operationHours}<br><strong>Fasilitas:</strong> ${resto.facilities.substring(0,100)}...</p>
      ${seatsHtml}
      ${actionButtons}
    `;
    modal.style.display = 'flex';
    
    // Event listener pemilihan kursi (hanya untuk mode reserve, dan kursi available)
    if (mode === 'reserve') {
      const seatsDivs = document.querySelectorAll('#dynamicSeatsGrid .seat');
      const updateCounter = () => {
        const counterSpan = document.getElementById('selectedCounter');
        if(counterSpan) counterSpan.innerText = tempSelectedSeats.length;
      };
      seatsDivs.forEach(seatDiv => {
        seatDiv.addEventListener('click', (e) => {
          const seatNum = parseInt(seatDiv.getAttribute('data-seat'));
          const isBooked = seatDiv.getAttribute('data-booked') === 'true';
          if (isBooked) {
            alert(`Kursi ${seatNum} sudah dipesan, pilih kursi lain.`);
            return;
          }
          // toggle selection
          if (tempSelectedSeats.includes(seatNum)) {
            tempSelectedSeats = tempSelectedSeats.filter(s => s !== seatNum);
            seatDiv.classList.remove('selected');
          } else {
            tempSelectedSeats.push(seatNum);
            seatDiv.classList.add('selected');
          }
          updateCounter();
        });
      });
      document.getElementById('confirmBookingBtn').addEventListener('click', () => {
        if(onConfirmCallback) {
          const success = onConfirmCallback(tempSelectedSeats);
          if(success !== false) {
            modal.style.display = 'none';
            tempSelectedSeats = [];
          }
        } else {
          modal.style.display = 'none';
        }
      });
      document.getElementById('cancelReserveBtn').addEventListener('click', () => {
        modal.style.display = 'none';
        tempSelectedSeats = [];
      });
    } else {
      // mode view (hanya lihat)
      document.getElementById('closeSeatViewBtn').addEventListener('click', () => {
        modal.style.display = 'none';
      });
    }
    // close jika klik di luar
    window.onclick = function(e) { if(e.target === modal) modal.style.display = 'none'; };
  }

  // Filter & search
  function getFilteredRestaurants() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;
    let filtered = [...restaurants];
    if(searchTerm !== '') {
      filtered = filtered.filter(r => r.name.toLowerCase().includes(searchTerm) || r.menuHighlights.toLowerCase().includes(searchTerm) || r.location.toLowerCase().includes(searchTerm));
    }
    if(category !== 'all') {
      filtered = filtered.filter(r => r.category === category);
    }
    return filtered;
  }

  document.getElementById('searchBtn').addEventListener('click', () => {
    const filtered = getFilteredRestaurants();
    renderRestaurants(filtered);
  });
  document.getElementById('searchInput').addEventListener('keyup', (e) => {
    if(e.key === 'Enter') document.getElementById('searchBtn').click();
  });

  // initial render
  renderRestaurants(restaurants);
</script>
</body>
</html>
