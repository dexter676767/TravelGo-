<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>TravelGo! | Kuliner Jakarta Selatan - Reservasi Kursi</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #fef8f0;
      color: #1e2a2f;
      scroll-behavior: smooth;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ========== NAVBAR RESPONSIVE ========== */
    .navbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 2px solid #ffd966;
      gap: 15px;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e67e22, #f39c12);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo span {
      font-size: 0.8rem;
      font-weight: 500;
      color: #b86f2c;
      display: block;
      line-height: 1.2;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      list-style: none;
      flex-wrap: wrap;
    }

    .nav-links li a {
      text-decoration: none;
      font-weight: 600;
      color: #2c3e2f;
      transition: 0.2s;
      padding: 5px 0;
    }

    .nav-links li a:hover,
    .nav-links li a.active {
      color: #e67e22;
      border-bottom: 2px solid #e67e22;
    }

    /* ========== SEARCH & FILTER ========== */
    .search-section {
      margin: 30px 0 30px;
    }

    .search-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      background: white;
      padding: 12px 20px;
      border-radius: 60px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    .search-input {
      flex: 3;
      min-width: 180px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f4f2ef;
      padding: 10px 18px;
      border-radius: 40px;
    }

    .search-input i {
      color: #e67e22;
      font-size: 1.1rem;
    }

    .search-input input {
      border: none;
      background: transparent;
      width: 100%;
      font-size: 0.95rem;
      outline: none;
      font-family: 'Poppins', sans-serif;
    }

    .filter-category {
      flex: 2;
      min-width: 200px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-category select,
    .filter-category button {
      padding: 10px 18px;
      border-radius: 40px;
      border: none;
      background: #f4f2ef;
      font-weight: 500;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .filter-category button {
      background: #e67e22;
      color: white;
      transition: 0.2s;
    }

    .filter-category button:hover {
      background: #cf711f;
    }

    /* ========== SECTION TITLE ========== */
    .section-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 20px 0 25px 0;
      border-left: 8px solid #e67e22;
      padding-left: 20px;
    }

    /* ========== RESTAURANT GRID (RESPONSIVE) ========== */
    .resto-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      margin-bottom: 60px;
    }

    .resto-card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
      transition: 0.25s;
    }

    .resto-card:hover {
      transform: translateY(-6px);
    }

    .card-img {
      height: 160px;
      background: linear-gradient(135deg, #ffddb0, #ffe0b5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #c25d1a;
    }

    .card-content {
      padding: 18px;
    }

    .resto-name {
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .resto-loc {
      color: #6c584c;
      font-size: 0.75rem;
      margin: 6px 0;
      word-break: break-word;
    }

    .hours-badge {
      background: #e9f5e9;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      display: inline-block;
      margin: 8px 0;
    }

    .price {
      font-weight: 700;
      color: #2c6e2f;
      font-size: 0.9rem;
    }

    .rating-stars {
      color: #f4b400;
      margin: 8px 0;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0;
    }

    .amenities span {
      background: #fef2e6;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin: 15px 0 10px;
      flex-wrap: wrap;
    }

    .btn-reserve,
    .btn-check-seats {
      background: #e67e22;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.8rem;
      font-family: 'Poppins', sans-serif;
      flex: 1;
      min-width: 120px;
    }

    .btn-check-seats {
      background: #2c6e2f;
    }

    .btn-reserve:hover,
    .btn-check-seats:hover {
      opacity: 0.85;
    }

    .resto-info {
      font-size: 0.7rem;
      color: #5c6e5a;
      margin-top: 12px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    .resto-info i {
      margin-right: 4px;
      width: 18px;
    }

    /* ========== MODAL BIOSKOP STYLE (RESPONSIVE) ========== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      overflow-y: auto;
      padding: 16px;
    }

    .modal-content {
      background: white;
      max-width: 700px;
      width: 100%;
      padding: 24px;
      border-radius: 32px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-content h3 {
      margin-bottom: 16px;
      font-size: 1.3rem;
    }

    .seat-screen {
      background: #222;
      color: white;
      text-align: center;
      padding: 8px;
      border-radius: 12px;
      margin: 15px 0;
      font-size: 0.75rem;
      letter-spacing: 2px;
    }

    .seats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 12px;
      margin: 20px 0;
      justify-items: center;
    }

    .seat {
      background: #e0e0e0;
      width: 100%;
      max-width: 75px;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: bold;
      transition: 0.1s;
      border: 2px solid transparent;
      text-align: center;
      padding: 5px;
    }

    .seat.available {
      background: #b0d9b1;
      color: #1e4a1e;
    }

    .seat.booked {
      background: #f4a4a4;
      color: #8b0000;
      cursor: not-allowed;
      text-decoration: line-through;
    }

    .seat.selected {
      background: #f39c12;
      border: 3px solid #e67e22;
      color: white;
      transform: scale(1.02);
    }

    .seat small {
      font-size: 0.6rem;
    }

    .seat-info {
      margin: 15px 0;
      padding: 12px;
      background: #f9f2e6;
      border-radius: 24px;
      font-size: 0.85rem;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .close-modal,
    .submit-modal {
      padding: 10px 20px;
      border-radius: 40px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }

    .close-modal {
      background: #bbb;
      color: #333;
    }

    .submit-modal {
      background: #e67e22;
      color: white;
    }

    /* ========== FOOTER ========== */
    footer {
      background: #1e2a2f;
      color: #ccc;
      padding: 30px 20px;
      margin-top: 40px;
      text-align: center;
      font-size: 0.85rem;
    }

    /* ========== RESPONSIVE: HP (max-width: 640px) ========== */
    @media (max-width: 640px) {
      .container {
        padding: 0 16px;
      }

      .navbar {
        flex-direction: column;
        text-align: center;
      }

      .logo h1 {
        font-size: 1.5rem;
      }

      .logo span {
        font-size: 0.7rem;
      }

      .nav-links {
        gap: 15px;
        justify-content: center;
      }

      .nav-links li a {
        font-size: 0.85rem;
      }

      .search-bar {
        flex-direction: column;
        border-radius: 32px;
        padding: 16px;
      }

      .search-input {
        width: 100%;
      }

      .filter-category {
        width: 100%;
        justify-content: space-between;
      }

      .filter-category select,
      .filter-category button {
        flex: 1;
        font-size: 0.85rem;
        padding: 8px 12px;
      }

      .section-title {
        font-size: 1.3rem;
        padding-left: 15px;
      }

      .resto-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .resto-name {
        font-size: 1.2rem;
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn-reserve,
      .btn-check-seats {
        width: 100%;
        text-align: center;
      }

      /* modal seat responsif */
      .seats-grid {
        grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
        gap: 8px;
      }

      .seat {
        font-size: 0.65rem;
      }

      .modal-content {
        padding: 18px;
      }

      .modal-content h3 {
        font-size: 1.1rem;
      }
    }

    /* Tablet (641px - 900px) */
    @media (min-width: 641px) and (max-width: 900px) {
      .resto-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .seats-grid {
        grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      }
    }

    /* Desktop besar */
    @media (min-width: 1400px) {
      .container {
        padding: 0 40px;
      }

      .resto-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="navbar">
    <div class="logo">
      <h1>TravelGo! <span>culinary highlight Jakarta Selatan</span></h1>
    </div>
    <ul class="nav-links">
      <li><a href="#" class="active">Home</a></li>
      <li><a href="#">Restoran</a></li>
      <li><a href="#">Kontak</a></li>
    </ul>
  </div>

  <div class="search-section">
    <div class="search-bar">
      <div class="search-input">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Cari restoran, menu, atau lokasi...">
      </div>
      <div class="filter-category">
        <select id="categoryFilter">
          <option value="all">Semua Kategori</option>
          <option value="indonesian">Nusantara</option>
          <option value="middle-eastern">Timur Tengah</option>
          <option value="international">Internasional</option>
        </select>
        <button id="searchBtn"><i class="fas fa-sliders-h"></i> Filter</button>
      </div>
    </div>
  </div>

  <div class="section-title"><i class="fas fa-utensils"></i> Rekomendasi Kuliner Jakarta Selatan</div>
  <div class="resto-grid" id="restoGrid"></div>

  <footer>
    <p>© 2025 TravelGo! — Informasi Menu, Harga, Fasilitas, Lokasi & Reservasi Kursi Bergaya Bioskop</p>
    <p style="margin-top: 8px; font-size: 0.75rem;"><i class="fas fa-mobile-alt"></i> Tersedia untuk Desktop & Mobile | Reservasi kursi interaktif</p>
  </footer>
</div>

<!-- MODAL RESERVASI -->
<div id="reservationModal" class="modal">
  <div class="modal-content" id="modalContentDynamic"></div>
</div>

<script>
  // ======================= DATA 5 RESTORAN LENGKAP =======================
  const restaurants = [
    {
      id: 1, name: "Lumpang Emas Signature - Prapanca", category: "indonesian",
      location: "Jl. Prapanca Raya No.40A, Pulo, Kec. Kby. Baru, Jakarta Selatan",
      operationHours: "10.00–22.00 (Setiap hari), Breakfast Sabtu-Minggu 07.00-11.00",
      priceRange: "Rp87k - Rp393k",
      rating: 4.8, totalReviews: 1127,
      facilities: "Wheelchair access, Toilet, Wi-Fi, Bar on site, Outdoor seating, Delivery, Takeaway, Dine-in",
      menuHighlights: "Paru Asam Manis, Kulit Ayam Goreng, Steak Nusantara",
      phone: "(021)80600900", website: "lumpangemas.com",
      imgIcon: "🍖", totalSeats: 42,
      seatMap: [], description: "Great coffee & dessert, casual cozy."
    },
    {
      id: 2, name: "Cerita Rasa Nusantara", category: "indonesian",
      location: "Jl. Ampera Raya No.9, Cilandak Timur, Jakarta Selatan",
      operationHours: "10.00–22.00 setiap hari",
      priceRange: "Rp39k - Rp169k",
      rating: 4.6, totalReviews: 4795,
      facilities: "Wheelchair access, Live music, Free parking, Wi-Fi, Private dining, Kids' menu, Outdoor seating",
      menuHighlights: "Gurame Bakar, Ayam Taliwang, Nasi Goreng",
      phone: "02178831600", website: "ceritarasa.co.id",
      imgIcon: "🍛", totalSeats: 56,
      seatMap: [], description: "Classic Indonesian, live music, family friendly."
    },
    {
      id: 3, name: "Jakarta Restaurant & The Courtyard", category: "international",
      location: "Jl. Brawijaya Raya No.26, Pulo, Kebayoran Baru",
      operationHours: "07.00–22.00 setiap hari",
      priceRange: "Rp115k - Rp595k",
      rating: 4.7, totalReviews: 639,
      facilities: "Halal food, Private dining, Art Deco, Leafy courtyard, Valet parking, Kids' menu",
      menuHighlights: "Sop Buntut, Nasi Goreng Dharmawangsa, Beef Tenderloin",
      phone: "08111025999", website: "the-dharmawangsa.com",
      imgIcon: "🍽️", totalSeats: 78,
      seatMap: [], description: "Hotel restaurant Art Deco & courtyard."
    },
    {
      id: 4, name: "Plataran Dharmawangsa", category: "indonesian",
      location: "Jl. Dharmawangsa Raya No.6, Pulo, Kebayoran Baru",
      operationHours: "11.00–22.00 setiap hari",
      priceRange: "Rp55k - Rp225k",
      rating: 4.7, totalReviews: 4112,
      facilities: "Live music, Joglo house, Valet parking, Organic dishes, Vegetarian options, Cocktails",
      menuHighlights: "Dendeng Batokok, Empal Gentong, Udang Gandum",
      phone: "(021)29044167", website: "plataran.com",
      imgIcon: "🍲", totalSeats: 64,
      seatMap: [], description: "Joglo tradisional, otentik, romantis."
    },
    {
      id: 5, name: "Abunawas Restaurant - Kemang", category: "middle-eastern",
      location: "Jl. Kemang Utara No.15, Bangka, Mampang Prapatan",
      operationHours: "09.00–21.45 setiap hari",
      priceRange: "Rp42k - Rp855k",
      rating: 4.6, totalReviews: 3173,
      facilities: "Middle Eastern decor, Plush seating, Free Wi-Fi, Valet parking, Kids' menu, Private dining",
      menuHighlights: "Mandhi Lamb, Briyani, Mix Grill, Hummus",
      phone: "(021)71794691", website: "abunawasresto.com",
      imgIcon: "🥘", totalSeats: 50,
      seatMap: [], description: "Timur Tengah otentik, mewah."
    }
  ];

  // Generate seat map random
  function generateSeatMap(resto) {
    const total = resto.totalSeats;
    let seats = [];
    for (let i = 1; i <= total; i++) {
      let isBooked = Math.random() < 0.25; // 25% random terisi
      seats.push({ seatNumber: i, isBooked: isBooked, isSelected: false });
    }
    return seats;
  }

  function initSeatMaps() {
    restaurants.forEach(r => {
      if (!r.seatMap || r.seatMap.length === 0) {
        r.seatMap = generateSeatMap(r);
      }
    });
  }
  initSeatMaps();

  function getAvailableSeatsCount(resto) {
    return resto.seatMap.filter(seat => !seat.isBooked).length;
  }

  // Render semua restoran
  function renderRestaurants(filteredData) {
    const container = document.getElementById('restoGrid');
    if (!container) return;
    container.innerHTML = '';
    filteredData.forEach(resto => {
      const available = getAvailableSeatsCount(resto);
      const card = document.createElement('div');
      card.className = 'resto-card';
      card.innerHTML = `
        <div class="card-img">${resto.imgIcon} <span style="font-size:0.8rem; margin-left:5px">⭐ ${resto.rating}</span></div>
        <div class="card-content">
          <div class="resto-name">${resto.name}</div>
          <div class="resto-loc"><i class="fas fa-map-marker-alt"></i> ${resto.location}</div>
          <div class="hours-badge"><i class="far fa-clock"></i> ${resto.operationHours.substring(0, 45)}${resto.operationHours.length > 45 ? '..' : ''}</div>
          <div class="price"><i class="fas fa-tag"></i> ${resto.priceRange}</div>
          <div class="rating-stars">⭐ ${resto.rating} (${resto.totalReviews} ulasan)</div>
          <div class="amenities">${resto.facilities.split(',').slice(0, 3).map(f => `<span>${f.trim()}</span>`).join('')}<span>+${resto.facilities.split(',').length - 3}</span></div>
          <div class="action-buttons">
            <button class="btn-check-seats" data-id="${resto.id}"><i class="fas fa-chair"></i> Cek Kursi (${available})</button>
            <button class="btn-reserve" data-id="${resto.id}"><i class="fas fa-calendar-check"></i> Reservasi</button>
          </div>
          <div class="resto-info"><i class="fas fa-phone"></i> ${resto.phone} | <i class="fas fa-globe"></i> ${resto.website}<br><i class="fas fa-utensils"></i> Menu: ${resto.menuHighlights}</div>
        </div>
      `;
      container.appendChild(card);
    });
    document.querySelectorAll('.btn-check-seats').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        openSeatViewer(id);
      });
    });
    document.querySelectorAll('.btn-reserve').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        openReservationModal(id);
      });
    });
  }

  let currentRestoForReservation = null;
  let tempSelectedSeats = [];

  function openSeatViewer(restoId) {
    const resto = restaurants.find(r => r.id === restoId);
    renderSeatModal(resto, 'view', null);
  }

  function openReservationModal(restoId) {
    const resto = restaurants.find(r => r.id === restoId);
    currentRestoForReservation = resto;
    tempSelectedSeats = [];
    renderSeatModal(resto, 'reserve', (selectedSeatsArray) => {
      if (selectedSeatsArray.length === 0) {
        alert("Pilih minimal 1 kursi/meja!");
        return false;
      }
      const guestName = prompt("Masukkan nama Anda untuk reservasi:", "Pelanggan TravelGo");
      if (!guestName) return false;
      selectedSeatsArray.forEach(seatNum => {
        const seatObj = resto.seatMap.find(s => s.seatNumber === seatNum);
        if (seatObj && !seatObj.isBooked) seatObj.isBooked = true;
      });
      alert(`✅ Reservasi berhasil!\nRestoran: ${resto.name}\nNama: ${guestName}\nKursi: ${selectedSeatsArray.join(', ')}\nSisa kursi: ${getAvailableSeatsCount(resto)}`);
      const filtered = getFilteredRestaurants();
      renderRestaurants(filtered);
      document.getElementById('reservationModal').style.display = 'none';
      return true;
    });
  }

  function renderSeatModal(resto, mode, onConfirmCallback) {
    const modal = document.getElementById('reservationModal');
    const modalContentDiv = document.getElementById('modalContentDynamic');
    const availableSeats = getAvailableSeatsCount(resto);

    let seatsHtml = `<div class="seat-screen"><i class="fas fa-film"></i> 🪑 LAYAR RESTO - Pilih Kursi / Meja</div>`;
    seatsHtml += `<div class="seats-grid" id="dynamicSeatsGrid">`;
    resto.seatMap.forEach(seat => {
      let seatClass = 'seat';
      let statusText = '';
      if (seat.isBooked) {
        seatClass += ' booked';
        statusText = 'Dipesan';
      } else {
        seatClass += ' available';
        statusText = 'Tersedia';
      }
      let isTempSelected = (mode === 'reserve' && tempSelectedSeats.includes(seat.seatNumber));
      let extraSelected = isTempSelected ? ' selected' : '';
      seatsHtml += `<div class="${seatClass}${extraSelected}" data-seat="${seat.seatNumber}" data-booked="${seat.isBooked}">
                      <i class="fas fa-chair"></i> <strong>${seat.seatNumber}</strong><br><small>${statusText}</small>
                    </div>`;
    });
    seatsHtml += `</div><div class="seat-info"><i class="fas fa-info-circle"></i> Total kursi: ${resto.totalSeats} | Tersedia: ${availableSeats} | <span id="selectedCounter">0</span> kursi dipilih</div>`;

    let actionButtons = '';
    if (mode === 'reserve') {
      actionButtons = `<div class="modal-buttons"><button id="cancelReserveBtn" class="close-modal">Batal</button><button id="confirmBookingBtn" class="submit-modal"><i class="fas fa-check-circle"></i> Konfirmasi Reservasi</button></div>`;
    } else {
      actionButtons = `<div class="modal-buttons"><button id="closeSeatViewBtn" class="close-modal">Tutup</button></div>`;
    }

    modalContentDiv.innerHTML = `
      <h3><i class="fas fa-utensils"></i> ${resto.name}</h3>
      <p style="font-size:0.85rem; margin-bottom:10px;"><strong>Jam:</strong> ${resto.operationHours}</p>
      ${seatsHtml}
      ${actionButtons}
    `;
    modal.style.display = 'flex';

    if (mode === 'reserve') {
      const seatsDivs = document.querySelectorAll('#dynamicSeatsGrid .seat');
      const updateCounter = () => {
        const counterSpan = document.getElementById('selectedCounter');
        if (counterSpan) counterSpan.innerText = tempSelectedSeats.length;
      };
      seatsDivs.forEach(seatDiv => {
        seatDiv.addEventListener('click', () => {
          const seatNum = parseInt(seatDiv.getAttribute('data-seat'));
          const isBooked = seatDiv.getAttribute('data-booked') === 'true';
          if (isBooked) {
            alert(`Kursi ${seatNum} sudah dipesan.`);
            return;
          }
          if (tempSelectedSeats.includes(seatNum)) {
            tempSelectedSeats = tempSelectedSeats.filter(s => s !== seatNum);
            seatDiv.classList.remove('selected');
          } else {
            tempSelectedSeats.push(seatNum);
            seatDiv.classList.add('selected');
          }
          updateCounter();
        });
      });
      document.getElementById('confirmBookingBtn')?.addEventListener('click', () => {
        if (onConfirmCallback) onConfirmCallback(tempSelectedSeats);
        else modal.style.display = 'none';
      });
      document.getElementById('cancelReserveBtn')?.addEventListener('click', () => {
        modal.style.display = 'none';
        tempSelectedSeats = [];
      });
    } else {
      document.getElementById('closeSeatViewBtn')?.addEventListener('click', () => {
        modal.style.display = 'none';
      });
    }
    window.onclick = function(e) { if (e.target === modal) modal.style.display = 'none'; };
  }

  function getFilteredRestaurants() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;
    let filtered = [...restaurants];
    if (searchTerm) {
      filtered = filtered.filter(r => r.name.toLowerCase().includes(searchTerm) || r.menuHighlights.toLowerCase().includes(searchTerm) || r.location.toLowerCase().includes(searchTerm));
    }
    if (category !== 'all') filtered = filtered.filter(r => r.category === category);
    return filtered;
  }

  document.getElementById('searchBtn').addEventListener('click', () => renderRestaurants(getFilteredRestaurants()));
  document.getElementById('searchInput').addEventListener('keyup', (e) => { if (e.key === 'Enter') document.getElementById('searchBtn').click(); });
  renderRestaurants(restaurants);
</script>
</body>
</html>
