<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Cerita Rasa Nusantara</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="menu-header">
    <a href="restaurant2.html" class="back-btn">← Menu</a>
    <h1>TravelGo!</h1>
  </header>

  <section class="menu-section food">
    <h2>FOOD <span class="badge">FOODIES</span></h2>
    <p>grab ur meals right now!</p>

    <div class="menu-images">
      <img src="assets/img/food1.jpg" alt="Food sample">
      <img src="assets/img/food2.jpg" alt="Food sample">
    </div>

    <div class="food-toggle" onclick="toggleFoodMenu2()">🍽 Klik di sini untuk lihat menu makanan</div>

    <div id="food-list-2" class="food-grid hidden">
      <div class="food-card">Sate Maranggi & Ketan Bakar <br><span>Rp. 139.000</span></div>
      <div class="food-card">Bandeng Bakar Dabu Dabu <br><span>Rp. 169.000</span></div>
      <div class="food-card">Asam Asam Iga <br><span>Rp. 129.000</span></div>
      <div class="food-card">Sop Buntut <br><span>Rp. 159.000</span></div>
      <div class="food-card">Soto Ayam Lamongan <br><span>Rp. 59.000</span></div>
      <div class="food-card">Rawon <br><span>Rp. 59.000</span></div>
    </div>
  </section>

  <script>
    function toggleFoodMenu2() {
      document.getElementById('food-list-2').classList.toggle('hidden');
    }
  </script>
</body>
</html>
