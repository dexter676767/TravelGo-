<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelGo! - Daftar</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
</head>
<body>
  <div class="form-container">
    <h1>TravelGo!</h1>
    <p class="tagline">Selamat datang, traveler</p>

    <h2>Daftar</h2>
    <form id="signupForm">
      <input type="text" class="username" placeholder="Nama pengguna">
      <input type="email" class="email" placeholder="Email">
      <input type="password" class="password" placeholder="Buat kata sandi">
      <span class="link">Sudah punya akun? <a href="login.html">Masuk</a></span>
      <button class="btn">Daftar</button>
    </form>

    <div class="social-icons">
      <img src="assets/icons/facebook.svg" alt="Facebook">
      <img src="assets/icons/google.svg" alt="Google">
      <img src="assets/icons/apple.svg" alt="Apple">
    </div>
  </div>
</body>
</html>
