<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelGo! | Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="top-section">
      <h1 class="logo">TravelGo!</h1>
      <p class="welcome">welcome traveler</p>
    </div>
    <div class="form-section">
      <h2>SIGN UP</h2>
      <form>
        <input type="text" placeholder="username" class="input pink-input" required />
        <input type="email" placeholder="email" class="input blue-input" required />
        <input type="password" placeholder="create password" class="input blue-input" required />
        <p class="switch-text">already have an account ? <a href="index.html">log in</a></p>
        <button type="submit" class="btn yellow-btn">Log in</button>
        <div class="social-login">
          <img src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg)" alt="Facebook">
          <img src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/google.svg)" alt="Google">
          <img src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/apple.svg)" alt="Apple">
        </div>
      </form>
    </div>
  </div>
</body>
</html>
