<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelGo! - Sign Up</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
</head>
<body>
  <div class="form-container">
    <h1>TravelGo!</h1>
    <p class="tagline">welcome traveler</p>

    <h2>SIGN UP</h2>
    <form id="signupForm">
      <input type="text" class="username" placeholder="Username">
      <input type="email" class="email" placeholder="Email">
      <input type="password" class="password" placeholder="Create Password">
      <span class="link">Already have an account? <a href="login.html">Log in</a></span>
      <button class="btn">Sign up</button>
    </form>

    <div class="social-icons">
      <img src="assets/icons/facebook.svg" alt="Facebook">
      <img src="assets/icons/google.svg" alt="Google">
      <img src="assets/icons/apple.svg" alt="Apple">
    </div>
  </div>
</body>
</html>
